<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="icon" href="https://dummyimage.com/32x32/000/fff.png">

<title>Buscador Ultra — Multi-proveedor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--accent:#4f46e5;
--accent2:#6366f1;
--bg:#f4f6fb;
--card:#ffffff;
--border:#e6e9f2;
--text:#1f2937;
--muted:#6b7280;
}

*{
box-sizing:border-box;
}

body{
font-family:Inter,system-ui;
margin:0;
background:var(--bg);
color:var(--text);
}

header{
background:white;
padding:20px 30px;
box-shadow:0 4px 12px rgba(0,0,0,.05);
display:flex;
flex-wrap:wrap;
gap:12px;
align-items:center;
}

header h1{
margin:0;
font-size:20px;
font-weight:700;
width:100%;
}

.searchbar{
display:flex;
flex-wrap:wrap;
gap:10px;
width:100%;
}

input[type="search"]{
flex:1;
padding:12px 14px;
border-radius:10px;
border:1px solid var(--border);
font-size:15px;
}

input[type="number"],
select{
padding:10px;
border-radius:8px;
border:1px solid var(--border);
font-size:14px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.btn{
background:linear-gradient(135deg,var(--accent),var(--accent2));
border:none;
color:white;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
font-weight:500;
transition:.25s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 16px rgba(0,0,0,.15);
}

main{
padding:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
}

.card{
background:var(--card);
border-radius:14px;
padding:12px;
box-shadow:0 8px 22px rgba(0,0,0,.05);
transition:.3s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 14px 28px rgba(0,0,0,.12);
}

.thumb{
width:100%;
height:200px;
border-radius:10px;
overflow:hidden;
background:#eee;
}

.thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.meta{
padding-top:10px;
display:flex;
flex-direction:column;
flex:1;
}

.title{
font-weight:600;
margin-bottom:6px;
font-size:15px;
}

.price{
color:var(--accent);
font-weight:700;
margin-bottom:8px;
}

.provider{
background:#eef2ff;
color:var(--accent);
padding:3px 8px;
border-radius:999px;
font-size:12px;
display:inline-block;
}

.footer-actions{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:auto;
align-items:center;
}

.small{
font-size:12px;
color:var(--muted);
}

.pager{
margin-top:25px;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
}

#carrito{
position:fixed;
right:0;
top:0;
height:100%;
width:360px;
background:white;
box-shadow:-6px 0 20px rgba(0,0,0,.1);
padding:20px;
overflow-y:auto;
transform:translateX(100%);
transition:.35s;
}

#carrito.open{
transform:translateX(0);
}

#carrito h2{
margin-top:0;
}

.cart-item{
display:flex;
gap:10px;
margin-bottom:12px;
border-bottom:1px solid var(--border);
padding-bottom:8px;
}

.cart-thumb{
width:60px;
height:60px;
border-radius:8px;
overflow:hidden;
}

.cart-thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.cart-info{
flex:1;
}

.cart-remove{
color:#ef4444;
font-size:12px;
cursor:pointer;
}

#toggleCart{
position:fixed;
bottom:18px;
right:18px;
background:linear-gradient(135deg,var(--accent),var(--accent2));
color:white;
padding:12px 18px;
border-radius:50px;
cursor:pointer;
box-shadow:0 8px 18px rgba(0,0,0,.2);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
backdrop-filter:blur(6px);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.overlay.hidden{
display:none;
}

.overlay-box{
background:white;
padding:30px 40px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
text-align:center;
}

.spinner{
width:44px;
height:44px;
border:4px solid #eee;
border-top:4px solid var(--accent);
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

@media(max-width:600px){

header{
padding:16px;
}

main{
padding:16px;
}

#carrito{
width:100%;
}

}

</style>

</head>

<body>

<header>

<h1>Buscador Ultra — Multi-proveedor</h1>

<div class="searchbar">

<input id="q" type="search" placeholder="Buscar producto...">

<div class="controls">

<select id="proveedorSelect">
<option value="">Todos</option>
</select>

<input id="minPrice" type="number" placeholder="Min $">

<input id="maxPrice" type="number" placeholder="Max $">

<select id="sort">
<option value="relevance">Relevancia</option>
<option value="price_asc">Precio ↑</option>
<option value="price_desc">Precio ↓</option>
</select>

<button id="buscarBtn" class="btn">Buscar</button>

<input type="file" id="imagenInput" accept="image/*">

<button id="btnBuscar" class="btn">Buscar por Imagen</button>

</div>

</div>

</header>

<main>

<div id="stats" class="small"></div>

<div id="resultados" class="grid"></div>

<div class="pager">

<button id="prevBtn" class="btn">Anterior</button>

<div id="pageInfo"></div>

<button id="nextBtn" class="btn">Siguiente</button>

</div>

</main>

<div id="carrito">

<h2>🛒 Carrito</h2>

<div id="cartContent"></div>

</div>

<div id="toggleCart">🛒</div>

<div id="overlayBusqueda" class="overlay hidden">

<div class="overlay-box">

<div class="spinner"></div>

<p>Buscando coincidencias...</p>

<p id="overlayTime">0s</p>

</div>

</div>

<script>

const API_BASE="/api"

let page=1

let perPage=24

let carrito=JSON.parse(localStorage.getItem("carritoMega")||"{}")

let relojInterval=null

let segundosImagen=0

function iniciarRelojImagen(){

segundosImagen=0

document.getElementById("overlayBusqueda").classList.remove("hidden")

relojInterval=setInterval(()=>{

segundosImagen++

document.getElementById("overlayTime").textContent=segundosImagen+"s"

},1000)

}

function detenerRelojImagen(){

clearInterval(relojInterval)

document.getElementById("overlayBusqueda").classList.add("hidden")

}

function guardarCarrito(){

localStorage.setItem("carritoMega",JSON.stringify(carrito))

renderCarrito()

}

function renderCarrito(){

const cont=document.getElementById("cartContent")

cont.innerHTML=""

for(const prov in carrito){

const h=document.createElement("h3")

h.textContent=prov

cont.appendChild(h)

carrito[prov].forEach((item,i)=>{

const div=document.createElement("div")

div.className="cart-item"

div.innerHTML=`

<div class="cart-thumb">

<img src="${item.imagen}">

</div>

<div class="cart-info">

<div>${item.titulo}</div>

<div class="price">${item.precio}</div>

</div>

<div class="cart-remove" data-p="${prov}" data-i="${i}">Eliminar</div>

`

cont.appendChild(div)

})

}

document.querySelectorAll(".cart-remove").forEach(b=>{

b.onclick=()=>{

const p=b.dataset.p

const i=b.dataset.i

carrito[p].splice(i,1)

if(!carrito[p].length)delete carrito[p]

guardarCarrito()

}

})

}

async function buscar(reset=true){

if(reset)page=1

const q=document.getElementById("q").value

const params=new URLSearchParams()

if(q)params.set("q",q)

params.set("page",page)

params.set("perPage",perPage)

document.getElementById("stats").textContent="Buscando..."

const r=await fetch(API_BASE+"/buscar?"+params)

const data=await r.json()

const cont=document.getElementById("resultados")

cont.innerHTML=""

data.results.forEach(item=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<div class="thumb">

<img src="${item.imagenCloud||item.imagen}" class="img-busqueda" data-img="${item.imagenCloud||item.imagen}">

</div>

<div class="meta">

<div class="title">${item.titulo}</div>

<div class="price">${item.precio}</div>

<div class="small">Proveedor: <span class="provider">${item.proveedor}</span></div>

<div class="footer-actions">

<a class="btn" target="_blank" href="${item.url}">Ir</a>

<button class="btn add">Carrito</button>

</div>

</div>

`

cont.appendChild(div)

div.querySelector(".add").onclick=()=>{

if(!carrito[item.proveedor])carrito[item.proveedor]=[]

carrito[item.proveedor].push(item)

guardarCarrito()

}

})

document.getElementById("pageInfo").textContent="Página "+data.page

}

document.getElementById("buscarBtn").onclick=()=>buscar(true)

document.getElementById("prevBtn").onclick=()=>{if(page>1){page--;buscar(false)}}

document.getElementById("nextBtn").onclick=()=>{page++;buscar(false)}

document.getElementById("toggleCart").onclick=()=>{

document.getElementById("carrito").classList.toggle("open")

}

buscar()

renderCarrito()

</script>

</body>

</html>
